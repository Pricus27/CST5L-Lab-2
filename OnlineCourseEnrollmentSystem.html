<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="portfolio.css">
    <title>OnlineCourseEnrollmentSystem</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

    <div class="container py-1">
    
    <div class="col-lg-4 d-flex align-items-stretch">

        <div class="card w-100">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-3"><i class="bi bi-mortarboard-fill"></i> Enrollment System</h5>
                <form method="post">

                    <label for="FirstName" class="form-label">First Name</label>
                    <input id="FirstName" type="text" class="form-control" placeholder="Type your name...">

                    <label for="LastName" class="form-label">Last Name</label>
                    <input id="LastName" type="text" class="form-control" placeholder="Type your last name...">

                    <label for="EmailAddress" class="form-label">Email Address</label>
                    <input id="EmailAddress" type="text" class="form-control" placeholder="email@example.com">

                    <label for="CourseName" class="form-label">Course Name</label>
                    <input id="CourseName" type="text" class="form-control" placeholder="ex: Computer Science">

                    <label for="EnrollmentDate" class="form-label">Enrollment Date</label>
                    <input type="text" class="form-control datepicker" data-provide="datepicker">


                    <button id="submitBtn" class="btn btn-primary w-100 mt-2">Submit Name</button>
                    <p id="result" class="mt-3 mb-0"></p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
